{% extends "base.html" %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center p-4 sm:p-8">

    <div class="w-full max-w-xl bg-white rounded-2xl shadow-lg p-6 sm:p-8">

        <h1 class="text-xl sm:text-2xl font-bold text-gray-800 mb-6">
            Ajouter un étudiant
        </h1>

        <form method="POST" class="space-y-5">

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2">
                    Photo (URL)
                </label>

                <input type="text" name="photo"
                       placeholder="https://..."
                       class="w-full border border-gray-200 px-4 py-2 rounded-lg focus:ring-2 focus:ring-purple-400 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2">
                    Nom complet
                </label>

                <input type="text"
                       name="name"
                       required
                       class="w-full border border-gray-200 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-400 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2">
                    Email
                </label>

                <input type="email"
                       name="email"
                       required
                       class="w-full border border-gray-200 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-400 outline-none">
            </div>

            <div class="flex flex-col sm:flex-row gap-3 pt-2">

                <button
                    class="w-full sm:w-auto bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 rounded-lg text-sm font-semibold transition">
                    Créer
                </button>

                <a href="{{ url_for('students.index') }}"
                   class="w-full sm:w-auto text-center bg-gray-200 hover:bg-gray-300 px-5 py-2 rounded-lg text-sm font-semibold transition">
                    Annuler
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
