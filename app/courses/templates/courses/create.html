{% extends "base.html" %}

{% block content %}

    <div class="p-8 max-w-xl">
        <a href="{{ url_for('courses.index') }}"
    class="inline-block bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700 mb-4">
    ← Retour
    </a>

        <h1 class="text-2xl font-bold mb-6">
            Créer cours
        </h1>

        <form method="POST">

            <input name="name"
            placeholder="Nom du cours"
            class="w-full border p-2 rounded mb-4">

            <select name="teacher" class="w-full border p-2 rounded mb-4">
                <option value="">-- Aucun enseignant --</option>
                {% for teacher in teachers %}
                    <option value="{{ teacher.id }}">
                        {{ teacher.name }}
                    </option>
                {% endfor %}
            </select>

            <button class="bg-purple-600 text-white px-4 py-2 rounded">
                Créer
            </button>

        </form>

    </div>

{% endblock %}
