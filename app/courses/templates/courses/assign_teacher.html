{% extends "base.html" %}

{% block content %}

<div class="p-8 max-w-xl">
    <a href="{{ url_for('courses.index') }}"
    class="inline-block bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700 mb-4">
    ← Retour
    </a>

    <h1 class="text-2xl font-bold mb-6">
        Assigner enseignant à un cours
    </h1>

    <form method="POST" class="space-y-4">

        <select name="course" class="w-full border p-2 rounded">
            {% for course in courses %}
                <option value="{{ course.id }}">
                    {{ course.title }}
                </option>
            {% endfor %}
        </select>

        <select name="teacher" class="w-full border p-2 rounded">
            {% for teacher in teachers %}
                <option value="{{ teacher.id }}">
                    {{ teacher.name }}
                </option>
            {% endfor %}
        </select>

        <button class="bg-blue-600 text-white px-4 py-2 rounded">
            Assigner
        </button>

    </form>

</div>

{% endblock %}
