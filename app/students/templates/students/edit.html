{% extends "base.html" %}

{% block content %}

<div class="p-8 flex justify-center">

  <div class="w-full max-w-md bg-white p-6 rounded shadow">

    <a href="{{ url_for('students.index') }}"
    class="inline-block bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700 mb-4">
    ← Retour
    </a>

    <h2 class="text-xl font-bold mb-4">Modifier étudiant</h2>

    <form method="POST" class="space-y-4">

      <input type="text" name="name" value="{{ student.name }}"
        class="w-full border p-2 rounded" placeholder="Nom">

      <input type="email" name="email" value="{{ student.email }}"
        class="w-full border p-2 rounded" placeholder="Email">

      <!-- STATUT -->
      <select name="active" class="w-full border p-2 rounded">
        <option value="true" {% if student['active'] %}selected{% endif %}>Actif</option>
        <option value="false" {% if not student['active'] %}selected{% endif %}>Inactif</option>
      </select>

      <button class="w-full bg-yellow-500 text-white py-2 rounded">
        Modifier
      </button>

    </form>

  </div>

</div>

{% endblock %}
