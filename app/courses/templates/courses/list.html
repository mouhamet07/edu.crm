{% extends "base.html" %}

{% block content %}

    <div class="p-8">

    <h1 class="text-2xl font-bold mb-6">Cours</h1>

    <a href="{{ url_for('courses.create') }}"
    class="bg-purple-600 text-white px-4 py-2 rounded">
    <i class="bi bi-plus-circle"></i> Créer cours
    </a>

    <a href="{{ url_for('courses.assign') }}"
    class="bg-blue-600 text-white px-4 py-2 rounded ml-3">
    <i class="bi bi-plus-circle"></i> Assigner cours
    </a>

    <table class="w-full bg-white rounded shadow mt-4">

    <thead class="bg-gray-100">

    <tr>
    <th class="p-3 ">ID</th>
    <th class="p-3 ">Nom</th>
    <th class="p-3 ">Enseignant</th>
    <th class="p-3 "> Actions</th>
    </tr>

    </thead>

    <tbody>

    {% for course in courses %}

    <tr class="border-t">

    <td class="p-3 text-center">{{ course.id }}</td>
    <td class="p-3 text-left">{{ course.title }}</td>
    <td class="p-3 text-left">{{ course.teacher.name }}</td>



    <td class="p-3">

    <a href="{{ url_for('courses.delete', id=course.id) }}" 
    class="inline-block bg-red-500 text-white text-sm px-3 py-1.5 rounded-lg shadow hover:bg-red-600 transition">
    <i class="bi bi-trash3"></i> Supprimer
    </a>

    </td>

    </tr>

    {% endfor %}

    </tbody>

    </table>

    </div>

{% endblock %}
