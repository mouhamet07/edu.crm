<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Edu.CRM</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    :root { --purple:#7c5cbf; }

    .sidebar-item { border-radius:12px; }
    .sidebar-item:hover { background:rgba(124,92,191,0.07); }
  </style>

</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">

<!-- SIDEBAR -->

<aside class="w-60 h-screen flex flex-col py-7 px-4 bg-white border-r border-gray-100">

  <div class="px-3 mb-10">
    <span class="font-extrabold text-2xl tracking-tight text-purple-600">Edu</span>
    <span class="font-extrabold text-2xl tracking-tight text-purple-900">.CRM</span>
  </div>

  <nav class="flex flex-col gap-2 flex-1">

    <a href="/dashboard" class="sidebar-item px-3 py-3 text-sm font-semibold text-purple-600">
      Dashboard
    </a>

    <a href="/students" class="sidebar-item px-3 py-4 text-sm text-gray-500">
      Étudiants
    </a>

    <a href="/teachers" class="sidebar-item px-3 py-4 text-sm text-gray-500">
      Enseignants
    </a>

    <a href="/courses" class="sidebar-item px-3 py-4 text-sm text-gray-500">
      Cours
    </a>

    <a href="/logout" class="sidebar-item px-3 py-4 text-sm text-red-400 mt-6">
      Logout
    </a>

  </nav>

</aside>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

  <!-- TOPBAR -->

  <header class="flex items-center justify-between px-8 py-4 bg-white border-b">

    <h1 class="text-xl font-bold text-gray-800">
      Dashboard
    </h1>

    <!-- PROFIL UTILISATEUR -->
    <div class="flex items-center gap-3">

      <div class="text-right">
        <p class="text-sm font-semibold text-gray-700">
          {{ session.get("user") }}
        </p>

        <p class="text-xs text-gray-400">
          Administrateur
        </p>
      </div>

      <!-- Avatar -->
      <div class="w-10 h-10 rounded-full bg-purple-500 flex items-center justify-center text-white font-bold">
        {{ session.get("user")[0] | upper }}
      </div>

    </div>

  </header>

  <!-- CONTENU VARIABLE -->

  <main class="flex-1 overflow-y-auto px-8 py-6">
    {% block content %}{% endblock %}
  </main>

</div>

</body>
</html>
