{% extends "base.html" %}

{% block content %}

<div class="p-8">

<h1 class="text-2xl font-bold mb-6">Cours</h1>

<a href="{{ url_for('courses.create') }}"
class="bg-purple-600 text-white px-4 py-2 rounded">
Créer cours
</a>

<a href="{{ url_for('courses.assign') }}"
class="bg-blue-600 text-white px-4 py-2 rounded ml-3">
Assigner cours
</a>

<table class="w-full bg-white rounded shadow mt-4">

<thead class="bg-gray-100">

<tr>
<th class="p-3 text-center">ID</th>
<th class="p-3 text-left">Nom</th>
<th class="p-3 text-left">Enseignant</th>
<th class="p-3 text-right"></th>
</tr>

</thead>

<tbody>

{% for course in courses %}

<tr class="border-t">

<td class="p-3 text-center">{{ loop.index0 + 1 }}</td>
<td class="p-3 text-left">{{ course.title }}</td>
<td class="p-3 text-left">{{ course.teacher }}</td>



<td class="p-3 text-right">

<a href="{{ url_for('courses.delete', id=loop.index0) }}"
class="text-red-500">
Supprimer
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
