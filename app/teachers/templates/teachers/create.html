{% extends "base.html" %}

{% block content %}

    <div class="p-8 max-w-xl">
        <a href="{{ url_for('teachers.index') }}"
        class="inline-block bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700 mb-4">
        ← Retour
        </a>

        <h1 class="text-2xl font-bold mb-6">Ajouter enseignant</h1>

        <form method="POST" class="space-y-4">

            <input name="name" placeholder="Nom"
            class="w-full border p-2 rounded">

            <input name="email" placeholder="Email"
            class="w-full border p-2 rounded">

            <input name="speciality" placeholder="Spécialité"
            class="w-full border p-2 rounded">

            <button class="bg-purple-600 text-white px-4 py-2 rounded">
                Créer
            </button>
            

        </form>

    </div>

{% endblock %}
