{% extends "base.html" %}

{% block content %}

<div class="p-8 flex justify-center">

  <div class="w-full max-w-2xl">

    <a href="{{ url_for('students.index') }}"
       class="inline-block bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700 mb-4">
      ← Retour
    </a>

    <div class="bg-white rounded shadow p-6 mb-6">

      <h1 class="text-2xl font-bold text-gray-800 mb-4">
        {{ student.name }}
      </h1>

      <div class="flex justify-between items-center">

        <span class="text-gray-500">Nombre de cours</span>

        <span class="bg-purple-100 text-purple-600 px-3 py-1 rounded-full text-sm font-semibold">
          {{ courses|length }}
        </span>

      </div>

    </div>

    <div class="bg-white rounded shadow p-6">

      <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
        <i class="bi bi-journal-bookmark"></i>
        Liste des cours
      </h3>

      <ul class="space-y-3">

        {% for course in courses %}

        <li class="flex items-center justify-between border border-gray-100 p-3 rounded hover:bg-gray-50 transition">

          <div class="flex items-center gap-3">

            <div class="w-8 h-8 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center text-xs font-bold">
              {{ course.title[0]|upper }}
            </div>

            <span class="text-gray-700 font-medium">
              {{ course.title }}
            </span>

          </div>

        </li>

        {% else %}

        <li class="text-gray-400 italic text-center py-6">
          Aucun cours assigné
        </li>

        {% endfor %}

      </ul>

    </div>

  </div>

</div>

{% endblock %}
