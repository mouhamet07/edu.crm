{% extends "base.html" %}

{% block content %}
<h2>Liste des enseignants</h2>

<a href="{{ url_for('teachers.create_teacher') }}">Ajouter</a>

<ul>
{% for teacher in teachers %}
    <li>
        {{ teacher.name }} - {{ teacher.speciality }}
        <a href="{{ url_for('teachers.delete_teacher_route', id=teacher.id) }}">
            Supprimer
        </a>
    </li>
{% endfor %}
</ul>

{% endblock %}
