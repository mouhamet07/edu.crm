{% extends "base.html" %}

{% block content %}

<div class="p-8 flex justify-center">

  <div class="w-full max-w-md bg-white p-6 rounded shadow">

    <!-- RETOUR -->
    <a href="{{ url_for('teachers.index') }}"
    class="inline-block bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700 mb-4">
    ← Retour
    </a>


    <h2 class="text-xl font-bold mb-4">
      Modifier enseignant
    </h2>

    <form method="POST" class="space-y-4">

      <!-- NOM -->
      <input type="text" name="name" value="{{ teacher.name }}"
        class="w-full border p-2 rounded"
        placeholder="Nom">

      <!-- EMAIL -->
      <input type="email" name="email" value="{{ teacher.email }}"
        class="w-full border p-2 rounded"
        placeholder="Email">

      <!-- SPECIALITE -->
      <input type="text" name="speciality" value="{{ teacher.speciality }}"
        class="w-full border p-2 rounded"
        placeholder="Spécialité">

      <!-- BOUTON -->
      <button class="w-full bg-yellow-500 text-white py-2 rounded hover:bg-yellow-600">
        Modifier
      </button>

    </form>

  </div>

</div>

{% endblock %}
