{% extends "base.html" %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center p-4 sm:p-8">

    <!-- CARD -->
    <div class="w-full max-w-xl bg-white rounded-2xl shadow-lg p-6 sm:p-8">

        <!-- BOUTON RETOUR -->
        <a href="{{ url_for('courses.index') }}"
           class="inline-block bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 mb-6 transition">
            ← Retour
        </a>

        <!-- TITRE -->
        <h1 class="text-xl sm:text-2xl font-bold mb-6 text-gray-800">
            Assigner cours à étudiant
        </h1>

        <!-- FORM -->
        <form method="POST" class="space-y-4">

            <!-- STUDENT -->
            <select name="student"
                    class="w-full border border-gray-200 p-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-300">
                {% for student in students %}
                    <option value="{{ student.id }}">
                        {{ student.name }}
                    </option>
                {% endfor %}
            </select>

            <!-- COURSE -->
            <select name="course"
                    class="w-full border border-gray-200 p-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-300">
                {% for course in courses %}
                    <option value="{{ course.id }}">
                        {{ course.title }}
                    </option>
                {% endfor %}
            </select>

            <!-- BUTTON -->
            <button class="w-full sm:w-auto bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition">
                Assigner
            </button>

        </form>

    </div>

</div>

{% endblock %}
