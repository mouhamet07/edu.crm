{% extends "base.html" %}

{% block content %}

<div class="p-8">

<h1 class="text-2xl font-bold mb-6">Enseignants</h1>

<a href="{{ url_for('teachers.create') }}"
class="bg-purple-600 text-white px-4 py-2 rounded mb-4 inline-block">
<i class="bi bi-plus-circle"></i> Ajouter enseignant
</a>

<!-- 🔍 RECHERCHE + FILTRE -->
<form method="GET" class="mb-4 flex gap-2">

  <input type="text" name="q" placeholder="Rechercher..."
  class="border p-2 rounded w-64">

  <select name="speciality" class="border p-2 rounded">
    <option value="">Toutes spécialités</option>
    <option value="Maths">Maths</option>
    <option value="Informatique">Informatique</option>
    <option value="Réseaux">Réseaux</option>
  </select>

  <button class="bg-gray-600 text-white px-3 py-2 rounded">
    Filtrer
  </button>

</form>

<table class="w-full bg-white rounded shadow">

<thead class="bg-gray-100">
<tr>
<th class="p-3 text-center">ID</th>
<th class="p-3 text-center">Nom</th>
<th class="p-3 text-center">Email</th>
<th class="p-3 text-center">Spécialité</th>
<th class="p-3 text-center">Actions</th>
</tr>
</thead>

<tbody>

{% for teacher in teachers %}

<tr class="border-t hover:bg-gray-50">

<td class="p-3 text-center">{{ teacher.id }}</td>
<td class="p-3 text-center">{{ teacher.name }}</td>
<td class="p-3 text-center">{{ teacher.email }}</td>
<td class="p-3 text-center">{{ teacher.speciality }}</td>

<!-- 🔢 NB COURS -->


<td class="p-3 text-center">

<div class="flex justify-center space-x-2">

<a href="{{ url_for('teachers.edit', id=teacher.id) }}"
class="bg-yellow-500 text-white px-3 py-1.5 rounded">
Modifier
</a>

<a href="{{ url_for('teachers.delete_teacher_route', id=teacher.id) }}"
class="bg-red-500 text-white px-3 py-1.5 rounded">
Supprimer
</a>

<a href="{{ url_for('teachers.detail', id=teacher.id) }}"
class="bg-gray-600 text-white px-3 py-1.5 rounded">
Détails
</a>

</div>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
